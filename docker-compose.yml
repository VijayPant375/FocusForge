version: '3.8'
services:
  mongodb:
    image: mongo:7.0
    ports: ["27017:27017"]
    volumes: [mongodb_data:/data/db]
  user-service:
    build: ./user-service
    ports: ["5001:5001"]
    environment:
      - PORT=5001
      - MONGODB_URI=${USER_DB_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on: [mongodb]
  habit-service:
    build: ./habit-service
    ports: ["5002:5002"]
    environment:
      - PORT=5002
      - MONGODB_URI=${HABIT_DB_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on: [mongodb]
  analytics-service:
    build: ./analytics-service
    ports: ["5003:5003"]
    environment:
      - PORT=5003
      - MONGODB_URI=${HABIT_DB_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on: [mongodb]
  ai-service:
    build: ./ai-service
    ports: ["5004:5004"]
    environment:
      - PORT=5004
      - MONGODB_URI=${HABIT_DB_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on: [mongodb]
  api-gateway:
    build: ./api-gateway
    ports: ["5000:5000"]
    environment:
      - PORT=5000
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - HABIT_SERVICE_URL=${HABIT_SERVICE_URL}
      - ANALYTICS_SERVICE_URL=${ANALYTICS_SERVICE_URL}
      - AI_SERVICE_URL=${AI_SERVICE_URL}
    depends_on: [user-service, habit-service, analytics-service, ai-service]
  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [api-gateway]
volumes:
  mongodb_data:
